# ══════════════════════════════════════════════════════════════════════════════
# RapidRAG — Outer Nginx Config for rapidrag.ai (Production)
# ══════════════════════════════════════════════════════════════════════════════
#
# This file goes on the PRODUCTION HOST at:
#   /etc/nginx/sites-available/rapidrag-production
#
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/rapidrag-production \
#              /etc/nginx/sites-enabled/rapidrag-production
#   sudo nginx -t && sudo nginx -s reload
#
# Architecture:
#   rapidrag.ai/           →  inner Docker nginx (port 3443)  →  Next.js
#   rapidrag.ai/connect/   →  api-gateway (port 4000) — rate limited
#   rapidrag.ai/auth/      →  Keycloak (127.0.0.1:8443, prefix stripped)
#   rapidrag.ai/auth/admin →  BLOCKED from public (admin console — SSH tunnel only)
#   rapidrag.ai/n8n/       →  n8n (port 5679)
#   rapidrag.ai/api/slack/ →  api-gateway direct (Slack webhooks/OAuth)
#
# SSL: Managed by Certbot / Let's Encrypt.
#   sudo certbot --nginx -d rapidrag.ai
#
# Keycloak is NOT exposed on a public port. Port 8443 is bound to 127.0.0.1 only.
# KC_HOSTNAME_URL=https://rapidrag.ai/auth tells Keycloak to generate /auth/-prefixed URLs.
# ══════════════════════════════════════════════════════════════════════════════

# ── Rate limiting — API Gateway ───────────────────────────────────────────────
# 30 req/min per IP with burst of 20. Protects /connect/ from scraping/abuse.
# This directive is at http level (sites-enabled files are included inside http {}).
limit_req_zone $binary_remote_addr zone=rapidrag_api:10m rate=30r/m;

# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name rapidrag.ai;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rapidrag.ai;

    # ── SSL (Let's Encrypt — populated by certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rapidrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rapidrag.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;

    # ── Keycloak Admin Console — internal only ────────────────────────────
    # The admin console must never be publicly reachable.
    # Access it via SSH tunnel: ssh -L 8443:localhost:8443 user@rapidrag.ai
    # then open https://localhost:8443/auth/admin/ in your browser.
    location /auth/admin/ {
        allow 127.0.0.1;
        deny all;
    }

    # ── Keycloak auth flows (public — login, token, well-known) ──────────
    # Browser login/logout/token-exchange flows go here.
    # /auth/ prefix is stripped before forwarding to Keycloak on localhost:8443.
    location /auth/ {
        proxy_pass            https://localhost:8443/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # ── Slack OAuth callback and webhooks (bypass rate limit) ─────────────
    # Slack signatures and OAuth state are verified by the api-gateway.
    location = /api/slack/oauth/callback {
        proxy_pass            https://localhost:4000/slack/oauth/callback;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    location = /api/slack/events {
        proxy_pass            https://localhost:4000/slack/events;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    location ~ ^/api/slack/events/ {
        proxy_pass            https://localhost:4000/slack/events/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    # ── API Gateway — rate limited ────────────────────────────────────────
    # All platform API calls (OAuth callbacks, RAG endpoints, integrations).
    # /connect/ prefix is stripped before forwarding to api-gateway:4000.
    location /connect/ {
        limit_req zone=rapidrag_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass            https://localhost:4000/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
    }

    # ── n8n Workflow Editor ───────────────────────────────────────────────
    location /n8n/ {
        proxy_pass            http://localhost:5679/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
    }

    # ── Next.js Web App ───────────────────────────────────────────────────
    # Catch-all: everything else goes to the inner Docker nginx (port 3443)
    # which forwards to the Next.js web container. No basePath prefix needed —
    # Next.js now serves at root /.
    location / {
        proxy_pass            https://localhost:3443/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }
}
