# ══════════════════════════════════════════════════════════════════════════════
# RapidRAG — Outer Nginx Config for rapidrag.ai (Production)
# ══════════════════════════════════════════════════════════════════════════════
#
# This file goes on the PRODUCTION HOST at:
#   /etc/nginx/sites-available/rapidrag-production
#
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/rapidrag-production \
#              /etc/nginx/sites-enabled/rapidrag-production
#   sudo nginx -t && sudo nginx -s reload
#
# Architecture:
#   rapidrag.ai/             →  301 redirect to /rapidrag/
#   rapidrag.ai/rapidrag/    →  inner Docker nginx (port 3443)  →  Next.js web container
#   rapidrag.ai/rapidrag/connect/  →  api-gateway container (port 4000)
#   rapidrag.ai/auth/        →  Keycloak (port 8443, loopback-only, prefix stripped)
#   rapidrag.ai/n8n/         →  n8n container (port 5679 mapped from 5678)
#
# SSL: Managed by Certbot / Let's Encrypt. Run:
#   sudo certbot --nginx -d rapidrag.ai
# after placing this config and before enabling.
#
# Keycloak is NOT exposed on a public port. All browser auth flows go through
# the /auth/ location below; port 8443 is bound to 127.0.0.1 only.
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name rapidrag.ai;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rapidrag.ai;

    # ── SSL (Let's Encrypt — populated by certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rapidrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rapidrag.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;

    # ── RapidRAG Root — exact match ───────────────────────────────────────
    # Next.js basePath=/rapidrag root page is at /rapidrag (no trailing slash).
    # Proxy both /rapidrag and /rapidrag/ to /rapidrag on the inner nginx so
    # Next.js serves the landing page without a redirect loop.
    location = /rapidrag/ {
        proxy_pass            https://localhost:3443/rapidrag;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
    }

    location = /rapidrag {
        proxy_pass            https://localhost:3443/rapidrag;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
    }

    # ── RapidRAG public Slack endpoints ──────────────────────────────────
    # Keep Slack under /rapidrag/api so the public contract is product-scoped.
    location = /rapidrag/api/slack/oauth/callback {
        rewrite ^/rapidrag/api/?(.*)$ /$1 break;
        proxy_pass            https://localhost:4000;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    location = /rapidrag/api/slack/events {
        rewrite ^/rapidrag/api/?(.*)$ /$1 break;
        proxy_pass            https://localhost:4000;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    location ~ ^/rapidrag/api/slack/events/ {
        rewrite ^/rapidrag/api/?(.*)$ /$1 break;
        proxy_pass            https://localhost:4000;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Host   $host;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
    }

    # ── RapidRAG Sub-pages (dashboard, _next assets, etc.) ───────────────
    location /rapidrag/ {
        proxy_pass            https://localhost:3443/rapidrag/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # NOTE: No /api/ or /gateway/ rewrite blocks needed here.
    # rapidrag.ai is a DEDICATED domain for RapidRAG only — there are no
    # other apps competing for /api/ paths. The browser's fetch("/api/auth/token")
    # goes to /api/ which is NOT served here; the Next.js app itself runs under
    # /rapidrag/ and its internal API routes are at /rapidrag/api/...
    # The browser automatically uses the correct basePath prefix in production
    # because it navigates via Next.js router which prepends /rapidrag.
    # Only the dev server (shared domain dev.eclassmanager.com) needs the rewrite.

    # ── RapidRAG API Gateway — OAuth callbacks + REST API ─────────────────
    # Registered OAuth redirect URIs must point here:
    #   https://rapidrag.ai/rapidrag/connect/oauth/callback/github
    #   https://rapidrag.ai/rapidrag/connect/oauth/callback/gitlab
    #   https://rapidrag.ai/rapidrag/connect/oauth/callback/google
    location /rapidrag/connect/ {
        proxy_pass            https://localhost:4000/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
    }

    # ── n8n Workflow Editor ───────────────────────────────────────────────
    # n8n webhooks: https://rapidrag.ai/n8n/webhook/<path>
    # n8n editor:   https://rapidrag.ai/n8n/
    # Docker maps n8n internal port 5678 → host port 5679
    location /n8n/ {
        proxy_pass            http://localhost:5679/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
    }

    # ── Root: permanent redirect to the app ──────────────────────────────
    location = / {
        return 301 /rapidrag/;
    }

    # ── Keycloak (internal — no public port 8443) ─────────────────────────
    # Keycloak listens on 127.0.0.1:8443 only. All browser auth flows
    # (login, token exchange, well-known, etc.) come through here.
    # The /auth/ prefix is stripped before forwarding to Keycloak.
    # KC_HOSTNAME_URL=https://rapidrag.ai/auth ensures Keycloak generates
    # redirect URLs with this prefix so the round-trip works correctly.
    location /auth/ {
        proxy_pass            https://localhost:8443/;
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_ssl_verify      off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # ── Dify (if deployed on same host) ─────────────────────────────────
    # Dify web UI at port 3000 (or 3002 depending on your mapping)
    # Uncomment and adjust port if Dify runs on this production host too.
    # location /dify/ {
    #     proxy_pass            http://localhost:3002/;
    #     proxy_set_header      Host               $host;
    #     proxy_set_header      X-Real-IP          $remote_addr;
    #     proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
    #     proxy_set_header      X-Forwarded-Proto  $scheme;
    #     proxy_http_version    1.1;
    #     proxy_set_header      Upgrade            $http_upgrade;
    #     proxy_set_header      Connection         "upgrade";
    # }
}
