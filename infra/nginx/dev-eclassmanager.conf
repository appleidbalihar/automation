# Cloudflare Tunnel Development Configuration
# Frontend: Port 3001, Backend: Port 5001

server {
    listen 80 default_server;
    server_name dev.eclassmanager.com *.dev.eclassmanager.com _;

    # Serve uploads directly (Prioritize over proxy)
    location ^~ /uploads/ {
        client_max_body_size 10M;
        alias /var/www/dance-club-data/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin *;
    }

    location = /legal/terms.html {
        alias /var/www/dance-club-production/legal/terms.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /legal/privacy.html {
        alias /var/www/dance-club-production/legal/privacy.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Exclude login and register routes so React Router handles them
    location ~ ^/club/[^/]+/(login|register|forgot-password|reset-password) {
        proxy_pass http://localhost:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Custom Club Landing Pages - Generic Rule
    location ^~ /club/ {
        alias /var/www/dance-club-production/public/clubs/;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Inject floating Login/Register buttons at the top right of static landing pages
        sub_filter '</body>' '<div style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; gap:10px;"><a href="./login" style="padding:8px 16px; background-color:#ffffff; color:#333333; border-radius:6px; text-decoration:none; font-family:sans-serif; font-weight:600; font-size:14px; box-shadow:0 4px 6px rgba(0,0,0,0.1); border:1px solid #e5e7eb; transition:all 0.2s;">Login</a><a href="./register" style="padding:8px 16px; background-color:#2C3E50; color:#ffffff; border-radius:6px; text-decoration:none; font-family:sans-serif; font-weight:600; font-size:14px; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:all 0.2s;">Sign Up</a></div></body>';
        sub_filter_once on;

        # Ensure Nginx modifies the HTML even if it's compressed
        proxy_set_header Accept-Encoding "";

        # Disable Caching during dev to see changes immediately
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # ── RapidRAG Platform ────────────────────────────────────────────────────
    # Root exact match: proxy to inner nginx WITHOUT trailing slash.
    # Next.js basePath=/rapidrag root page lives at /rapidrag (no trailing slash).
    # When user visits /rapidrag/ we proxy to /rapidrag (no slash) — Next.js serves
    # the landing page directly without any redirect.
    location = /rapidrag/ {
        proxy_pass          https://localhost:3443/rapidrag;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
    }

    # Exact match: /rapidrag (no trailing slash) — same thing
    location = /rapidrag {
        proxy_pass          https://localhost:3443/rapidrag;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version  1.1;
    }

    # All sub-pages: /rapidrag/dashboard/, /rapidrag/_next/, etc.
    location /rapidrag/ {
        proxy_pass          https://localhost:3443/rapidrag/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
    }

    # RapidRAG — Next.js internal API routes called by the browser without basePath.
    # Raw fetch("/api/auth/token") from React components doesn't get basePath prepended
    # by Next.js — it hits /api/ directly. We rewrite it to /rapidrag/api/ so Next.js
    # serves it correctly.
    # IMPORTANT: Only intercept /api/auth/ and /api/admin/ and /api/profile/ paths
    # (RapidRAG Next.js routes). Leave /api alone so Dance Club API (port 6000) still works.
    location ~ ^/api/(auth|admin|profile)(/|$) {
        rewrite ^/api/(.*)$ /rapidrag/api/$1 break;
        proxy_pass          https://localhost:3443;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version  1.1;
    }

    # RapidRAG gateway — raw /gateway/ calls from browser (resolveApiBase returns /gateway)
    # Rewrite to /rapidrag/gateway/ so Next.js gateway proxy route handles it.
    location /gateway/ {
        rewrite ^/gateway/(.*)$ /rapidrag/gateway/$1 break;
        proxy_pass          https://localhost:3443;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version  1.1;
    }

    # RapidRAG API gateway — OAuth callbacks and REST API
    # Registered redirect URIs: https://dev.eclassmanager.com/rapidrag/connect/oauth/callback/{github,gitlab,google}
    location /rapidrag/connect/ {
        proxy_pass          https://localhost:4000/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_ssl_verify    off;
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
    }

    # Backward compatibility — redirect old /ap/ path to /rapidrag/
    location /ap/ {
        return 301 /rapidrag/;
    }

    # Dify RAG UI
    location /dify/ {
        proxy_pass          http://localhost:3000/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }

    # n8n Workflow Editor
    location /n8n/ {
        proxy_pass          http://localhost:5679/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }

    location /api {
        proxy_pass http://localhost:6000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://localhost:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# API endpoints
server {
    listen 80;
    server_name api.dev.eclassmanager.com;

    location / {
        proxy_pass http://localhost:6000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts for API
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
