events {}

http {
  # Use Docker's internal DNS resolver so upstream hostnames are re-resolved
  # every 30 s instead of being cached for the lifetime of the nginx process.
  # This prevents 502s after containers restart and get new IPs.
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /tls/cert.pem;
    ssl_certificate_key /tls/key.pem;
    ssl_client_certificate /tls/ca.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── RapidRAG Web UI ──────────────────────────────────────────────────────
    # Next.js basePath=/rapidrag, trailingSlash=true.
    # Match both /rapidrag and /rapidrag/ and pass through to Next.js.
    # Next.js handles the path and serves the correct page.
    location /rapidrag {
      set $web_upstream http://web:3000;
      proxy_pass         $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
    }

    # ── n8n Workflow Editor ───────────────────────────────────────────────────
    # Outer nginx passes /n8n/* here; strip the prefix before forwarding to n8n.
    location /n8n/ {
      set $n8n_upstream http://n8n:5678;
      rewrite ^/n8n/?(.*)$ /$1 break;
      proxy_pass         $n8n_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Host   $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
    }

    # ── Public Slack OAuth callback and webhooks ─────────────────────────────
    # These endpoints intentionally bypass browser auth. Slack signatures and
    # OAuth state are verified by api-gateway/workflow-service.
    location = /rapidrag/api/slack/oauth/callback {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/rapidrag/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
    }

    location = /rapidrag/api/slack/events {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/rapidrag/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
      proxy_request_buffering off;
      # Enable only after staging validation; app-level throttling can still
      # return a friendly Slack message, while nginx rejection cannot.
      # limit_req zone=slack_webhook burst=10 nodelay;
    }

    location ~ ^/rapidrag/api/slack/events/ {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/rapidrag/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
      proxy_request_buffering off;
      # Enable only after staging validation; app-level throttling can still
      # return a friendly Slack message, while nginx rejection cannot.
      # limit_req zone=slack_webhook burst=10 nodelay;
    }

    location = /api/slack/oauth/callback {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
    }

    location = /api/slack/events {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
      proxy_request_buffering off;
      # Enable only after staging validation; app-level throttling can still
      # return a friendly Slack message, while nginx rejection cannot.
      # limit_req zone=slack_webhook burst=10 nodelay;
    }

    location ~ ^/api/slack/events/ {
      set $api_upstream https://api-gateway:4000;
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass              $api_upstream;
      proxy_ssl_verify        off;
      proxy_set_header        Host               $host;
      proxy_set_header        X-Real-IP          $remote_addr;
      proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Host   $host;
      proxy_set_header        X-Forwarded-Proto  https;
      proxy_request_buffering off;
      # Enable only after staging validation; app-level throttling can still
      # return a friendly Slack message, while nginx rejection cannot.
      # limit_req zone=slack_webhook burst=10 nodelay;
    }

    # ── RapidRAG Next.js API compatibility ───────────────────────────────────
    # Browser fetch("/api/...") is not automatically prefixed by Next basePath.
    # Route the app-owned API paths back to Next.js under /rapidrag/api/... so
    # cached clients do not receive an nginx HTML 404 when they expect JSON.
    location ~ ^/api/(auth|admin|profile)(/|$) {
      set $web_upstream http://web:3000;
      rewrite ^/api/(.*)$ /rapidrag/api/$1 break;
      proxy_pass         $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    }

    location /gateway/ {
      set $web_upstream http://web:3000;
      rewrite ^/gateway/(.*)$ /rapidrag/gateway/$1 break;
      proxy_pass         $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    }

    # ── Root redirect ─────────────────────────────────────────────────────────
    # Convenience: hitting the bare host redirects to the RapidRAG landing page.
    location = / {
      return 302 /rapidrag/;
    }
  }
}
