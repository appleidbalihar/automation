events {}

http {
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /tls/cert.pem;
    ssl_certificate_key /tls/key.pem;
    ssl_client_certificate /tls/ca.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── RapidRAG Web UI ──────────────────────────────────────────────────────
    # Next.js basePath=/rapidrag, trailingSlash=true.
    # Match both /rapidrag and /rapidrag/ and pass through to Next.js.
    # Next.js handles the path and serves the correct page.
    location /rapidrag {
      proxy_pass         http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
    }

    # ── n8n Workflow Editor ───────────────────────────────────────────────────
    # Outer nginx passes /n8n/* here; strip the prefix before forwarding to n8n.
    location /n8n/ {
      rewrite ^/n8n/?(.*)$ /$1 break;
      proxy_pass         http://n8n:5678;
      proxy_http_version 1.1;
      proxy_set_header   Host               $host;
      proxy_set_header   X-Forwarded-Host   $host;
      proxy_set_header   X-Forwarded-Proto  https;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
    }

    # ── Root redirect ─────────────────────────────────────────────────────────
    # Convenience: hitting the bare host redirects to the RapidRAG landing page.
    location = / {
      return 302 /rapidrag/;
    }
  }
}
