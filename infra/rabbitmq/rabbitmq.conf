listeners.tcp = none
listeners.ssl.default = 5671

ssl_options.cacertfile = /tls/ca.pem
ssl_options.certfile = /tls/cert.pem
ssl_options.keyfile = /tls/key.pem
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = true

management.ssl.port = 15671
management.ssl.cacertfile = /tls/ca.pem
management.ssl.certfile = /tls/cert.pem
management.ssl.keyfile = /tls/key.pem

loopback_users.guest = false
