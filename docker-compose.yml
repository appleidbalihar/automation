x-shared-env: &shared-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-automation}?schema=public&sslmode=verify-full&sslrootcert=/tls/ca.pem
  REDIS_URL: rediss://:platformredis@redis:6379
  RABBITMQ_URL: amqps://guest:guest@rabbitmq:5671
  OPENSEARCH_URL: https://admin:DevAdmin123!@opensearch:9200
  KEYCLOAK_URL: https://keycloak:8443
  KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://localhost:8443}
  KEYCLOAK_REALM: ${KEYCLOAK_REALM:-automation-platform}
  KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-automation-web}
  KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-replace-me}
  WORKFLOW_SERVICE_URL: https://workflow-service:4001
  ORDER_SERVICE_URL: https://order-service:4002
  EXECUTION_ENGINE_SERVICE_URL: https://execution-engine:4003
  INTEGRATION_SERVICE_URL: https://integration-service:4004
  LOGGING_SERVICE_URL: https://logging-service:4005
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
  TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-automation-task-queue}
  FLOWISE_PLANNER_URL: ${FLOWISE_PLANNER_URL:-http://flowise:3000/api/v1/prediction/default}
  FLOWISE_OPERATIONS_CHAT_URL: ${FLOWISE_OPERATIONS_CHAT_URL:-http://flowise:3000/api/v1/prediction/4b37e62c-da5c-43e5-ba10-8a1cfc9d06f1}
  FLOWISE_API_KEY: ${FLOWISE_API_KEY:-}
  INTEGRATION_REST_URL_ALLOWLIST: ${INTEGRATION_REST_URL_ALLOWLIST:-^https?://|^http://localhost:}
  INTEGRATION_SCRIPT_ALLOWLIST: ${INTEGRATION_SCRIPT_ALLOWLIST:-.*}
  INTEGRATION_SSH_ALLOWLIST: ${INTEGRATION_SSH_ALLOWLIST:-.*}
  INTEGRATION_NETCONF_ALLOWLIST: ${INTEGRATION_NETCONF_ALLOWLIST:-.*}
  VAULT_ADDR: http://vault:8200
  VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
  VAULT_STRICT_SECRETS: ${VAULT_STRICT_SECRETS:-true}
  VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
  MTLS_REQUIRED: "true"
  TLS_CERT_PATH: /tls/cert.pem
  TLS_KEY_PATH: /tls/key.pem
  TLS_CA_PATH: /tls/ca.pem
  TLS_VERIFY_PEER: ${TLS_VERIFY_PEER:-true}
  TLS_RELOAD_DEBOUNCE_MS: ${TLS_RELOAD_DEBOUNCE_MS:-1000}
  SECURITY_DIAGNOSTICS_TOKEN: ${SECURITY_DIAGNOSTICS_TOKEN:-}
  NODE_EXTRA_CA_CERTS: /tls/ca.pem

x-backend-build: &backend-build
  context: .
  dockerfile: infra/docker/Dockerfile.service

x-vault-agent: &vault-agent
  image: hashicorp/vault:1.17
  command: ["sh", "/vault/scripts/agent-entrypoint.sh"]
  environment:
    VAULT_ADDR: http://vault:8200
    CERT_TTL: ${TLS_CERT_TTL:-8760h}
  volumes:
    - ./infra/vault:/vault/scripts:ro
    - vault_data:/vault/file:ro
  depends_on:
    vault-bootstrap:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: ankane/pgvector:latest
    command:
      [
        "bash",
        "-lc",
        "cp /tls/cert.pem /var/lib/postgresql/server.crt && cp /tls/key.pem /var/lib/postgresql/server.key && cp /tls/ca.pem /var/lib/postgresql/root.crt && chown postgres:postgres /var/lib/postgresql/server.crt /var/lib/postgresql/server.key /var/lib/postgresql/root.crt && chmod 600 /var/lib/postgresql/server.key && chmod 644 /var/lib/postgresql/server.crt /var/lib/postgresql/root.crt && export PATH=/usr/lib/postgresql/15/bin:$PATH && exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key -c ssl_ca_file=/var/lib/postgresql/root.crt -c hba_file=/etc/postgresql/pg_hba.conf"
      ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-automation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - tls_postgres:/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-automation}"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres-vault-agent:
        condition: service_started

  postgres-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: postgres
      CERT_COMMON_NAME: postgres
      CERT_ALT_NAMES: postgres,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_postgres:/tls

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - tls_redis:/tls:ro
    depends_on:
      redis-vault-agent:
        condition: service_started

  redis-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: redis
      CERT_COMMON_NAME: redis
      CERT_ALT_NAMES: redis,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_redis:/tls

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
    ports:
      - "5671:5671"
      - "15671:15671"
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - tls_rabbitmq:/tls:ro
    depends_on:
      rabbitmq-vault-agent:
        condition: service_started

  rabbitmq-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: rabbitmq
      CERT_COMMON_NAME: rabbitmq
      CERT_ALT_NAMES: rabbitmq,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_rabbitmq:/tls

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "DevAdmin123!"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /root/.minio/certs/CAs && cp /tls/cert.pem /root/.minio/certs/public.crt && cp /tls/key.pem /root/.minio/certs/private.key && cp /tls/ca.pem /root/.minio/certs/CAs/ca.crt && exec minio server /data --console-address :9001"
      ]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - tls_minio:/tls:ro
    depends_on:
      minio-vault-agent:
        condition: service_started

  minio-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: minio
      CERT_COMMON_NAME: minio
      CERT_ALT_NAMES: minio,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_minio:/tls

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      [
        "start",
        "--import-realm",
        "--http-enabled=false",
        "--https-port=8443",
        "--https-certificate-file=/tls/cert.pem",
        "--https-certificate-key-file=/tls/key.pem",
        "--hostname-strict=false"
      ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8443:8443"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - tls_keycloak:/tls:ro
    depends_on:
      keycloak-vault-agent:
        condition: service_started

  keycloak-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: keycloak
      CERT_COMMON_NAME: keycloak
      CERT_ALT_NAMES: keycloak,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_keycloak:/tls

  temporal-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.26.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    depends_on:
      temporal-postgres:
        condition: service_started
    volumes:
      - ./infra/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro

  temporal-ui:
    image: temporalio/ui:2.30.3
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
    depends_on:
      temporal:
        condition: service_started
    ports:
      - "8088:8080"

  flowise:
    image: flowiseai/flowise:2.2.3
    environment:
      PORT: 3000
      DATABASE_TYPE: sqlite
      DATABASE_PATH: /root/.flowise
      LOG_LEVEL: debug
      DEBUG: langchain*,flowise*
      NODE_ENV: development
      REQUEST_TIMEOUT: 300000   # 5 minutes global timeout
      FLOWISE_OPENAI_BASEPATH: ${FLOWISE_OPENAI_BASEPATH:-}
      FLOWISE_TECH_ENGINEER_REPO_LINK: ${FLOWISE_TECH_ENGINEER_REPO_LINK:-https://github.com/appleidbalihar/automation}
      FLOWISE_TECH_ENGINEER_REPO_BRANCH: ${FLOWISE_TECH_ENGINEER_REPO_BRANCH:-master}
      FLOWISE_OPENAI_CHAT_MODEL: ${FLOWISE_OPENAI_CHAT_MODEL:-gpt-4o-mini}
      FLOWISE_OPENAI_EMBEDDING_MODEL: ${FLOWISE_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}

    ports:
      - "3001:3000"
    volumes:
      - flowise_data:/root/.flowise

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - ./infra/vault/vault.hcl:/vault/config/vault.hcl:ro
      - vault_data:/vault/file
    restart: unless-stopped

  vault-bootstrap:
    image: hashicorp/vault:1.17
    command: ["sh", "/vault/scripts/bootstrap-pki.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_INIT_FILE: /vault/file/vault-init.json
      APPROLE_DIR: /vault/file/approle
      PKI_LEAF_TTL: ${PKI_LEAF_TTL:-8760h}
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file
    depends_on:
      vault:
        condition: service_started
    restart: "no"

  db-migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_healthy
      postgres-vault-agent:
        condition: service_started
    volumes:
      - tls_postgres:/tls:ro
    restart: "no"

  workflow-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: workflow-service
      CERT_COMMON_NAME: workflow-service
      CERT_ALT_NAMES: workflow-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_workflow_service:/tls

  workflow-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4001
      SERVICE_NAME: workflow-service
      VAULT_ADDR: http://workflow-service-vault-agent:8200
    volumes:
      - tls_workflow_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      flowise:
        condition: service_started
      workflow-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  order-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: order-service
      CERT_COMMON_NAME: order-service
      CERT_ALT_NAMES: order-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_order_service:/tls

  order-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4002
      SERVICE_NAME: order-service
    volumes:
      - tls_order_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      temporal:
        condition: service_started
      order-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  execution-engine-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: execution-engine
      CERT_COMMON_NAME: execution-engine
      CERT_ALT_NAMES: execution-engine,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_execution_engine:/tls

  execution-engine:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4003
      SERVICE_NAME: execution-engine
    volumes:
      - tls_execution_engine:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      execution-engine-vault-agent:
        condition: service_started
    restart: unless-stopped

  integration-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: integration-service
      CERT_COMMON_NAME: integration-service
      CERT_ALT_NAMES: integration-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_integration_service:/tls

  integration-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4004
      SERVICE_NAME: integration-service
      VAULT_ADDR: http://integration-service-vault-agent:8200
    volumes:
      - tls_integration_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      vault:
        condition: service_started
      integration-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  logging-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: logging-service
      CERT_COMMON_NAME: logging-service
      CERT_ALT_NAMES: logging-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_logging_service:/tls

  logging-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4005
      SERVICE_NAME: logging-service
    volumes:
      - tls_logging_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      logging-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  api-gateway-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: api-gateway
      CERT_COMMON_NAME: api-gateway
      CERT_ALT_NAMES: api-gateway,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_api_gateway:/tls

  api-gateway:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4000
      SERVICE_NAME: api-gateway
    volumes:
      - tls_api_gateway:/tls:ro
      - rotation_control:/rotation-control
    depends_on:
      workflow-service:
        condition: service_started
      order-service:
        condition: service_started
      logging-service:
        condition: service_started
      api-gateway-vault-agent:
        condition: service_started
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL:-}
      WEB_INTERNAL_API_BASE_URL: ${WEB_INTERNAL_API_BASE_URL:-https://api-gateway:4000}
      PORT: 3000
      KEYCLOAK_URL: ${WEB_KEYCLOAK_URL:-https://keycloak:8443}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REGISTER_DEFAULT_ROLE: ${KEYCLOAK_REGISTER_DEFAULT_ROLE:-useradmin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-automation-platform}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-automation-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
    volumes:
      - tls_web:/tls:ro
    depends_on:
      api-gateway:
        condition: service_started
      web-vault-agent:
        condition: service_started
    restart: unless-stopped

  web-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: web
      CERT_COMMON_NAME: web
      CERT_ALT_NAMES: web,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_web:/tls

  web-ingress:
    image: nginx:1.27-alpine
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./infra/nginx/web-https.conf:/etc/nginx/nginx.conf:ro
      - tls_web_ingress:/tls:ro
    depends_on:
      web:
        condition: service_started
      web-ingress-vault-agent:
        condition: service_started
    ports:
      - "3443:443"
    restart: unless-stopped

  web-ingress-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: web
      CERT_COMMON_NAME: web
      CERT_ALT_NAMES: web,localhost
      CERT_IP_SANS: ${WEB_CERT_IP_SANS:-}
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_web_ingress:/tls

  cert-rotation-controller:
    image: docker:27-cli
    command: ["sh", "/vault/scripts/rotation-controller.sh"]
    environment:
      ROTATION_INTERVAL_SECONDS: ${ROTATION_INTERVAL_SECONDS:-20}
      TLS_ROOT: /tls
      ROTATION_REQUESTS_FILE: /rotation-control/requests.jsonl
      ROTATION_ENABLE_FALLBACK: ${ROTATION_ENABLE_FALLBACK:-false}
      TARGET_CONTAINERS: ${ROTATION_TARGET_CONTAINERS:-postgres rabbitmq redis keycloak minio opensearch}
      RESTART_WINDOW_SECONDS: ${RESTART_WINDOW_SECONDS:-1800}
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - tls_api_gateway:/tls/api-gateway:ro
      - tls_workflow_service:/tls/workflow-service:ro
      - tls_order_service:/tls/order-service:ro
      - tls_execution_engine:/tls/execution-engine:ro
      - tls_integration_service:/tls/integration-service:ro
      - tls_logging_service:/tls/logging-service:ro
      - rotation_control:/rotation-control
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  vault_data:
  tls_api_gateway:
  tls_workflow_service:
  tls_order_service:
  tls_execution_engine:
  tls_integration_service:
  tls_logging_service:
  rotation_control:
  tls_postgres:
  tls_rabbitmq:
  tls_redis:
  tls_keycloak:
  tls_minio:
  tls_web:
  tls_web_ingress:
  temporal_pg_data:
  flowise_data:
