x-shared-env: &shared-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-automation}?schema=public&sslmode=verify-full&sslrootcert=/tls/ca.pem
  REDIS_URL: rediss://:platformredis@redis:6379
  RABBITMQ_URL: amqps://guest:guest@rabbitmq:5671
  OPENSEARCH_URL: https://admin:DevAdmin123!@opensearch:9200
  KEYCLOAK_URL: https://keycloak:8443
  KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://localhost:8443}
  KEYCLOAK_REALM: ${KEYCLOAK_REALM:-automation-platform}
  KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-automation-web}
  KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-replace-me}
  WORKFLOW_SERVICE_URL: https://workflow-service:4001
  LOGGING_SERVICE_URL: https://logging-service:4005
  FLOWISE_OPERATIONS_CHAT_URL: ${FLOWISE_OPERATIONS_CHAT_URL:-http://flowise:3000/api/v1/prediction/4b37e62c-da5c-43e5-ba10-8a1cfc9d06f1}
  FLOWISE_API_KEY: ${FLOWISE_API_KEY:-}
  # Dify — internal base URL only; API keys are stored in Vault, never in env
  DIFY_API_BASE_URL: ${DIFY_API_BASE_URL:-http://dify-api:5001}
  # n8n — internal base URL only; credentials are stored in Vault, never in env
  N8N_API_BASE_URL: ${N8N_API_BASE_URL:-http://n8n:5678}
  N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN:-}
  N8N_API_KEY: ${N8N_API_KEY:-}
  RAG_SYNC_PROGRESS_CALLBACK_BASE_URL: ${RAG_SYNC_PROGRESS_CALLBACK_BASE_URL:-https://api-gateway:4000}
  VAULT_ADDR: http://vault:8200
  VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
  VAULT_STRICT_SECRETS: ${VAULT_STRICT_SECRETS:-true}
  VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
  MTLS_REQUIRED: "true"
  TLS_CERT_PATH: /tls/cert.pem
  TLS_KEY_PATH: /tls/key.pem
  TLS_CA_PATH: /tls/ca.pem
  TLS_VERIFY_PEER: ${TLS_VERIFY_PEER:-true}
  TLS_RELOAD_DEBOUNCE_MS: ${TLS_RELOAD_DEBOUNCE_MS:-1000}
  SECURITY_DIAGNOSTICS_TOKEN: ${SECURITY_DIAGNOSTICS_TOKEN:-}
  NODE_EXTRA_CA_CERTS: /tls/ca.pem

x-backend-build: &backend-build
  context: .
  dockerfile: infra/docker/Dockerfile.service

x-vault-agent: &vault-agent
  image: hashicorp/vault:1.17
  entrypoint: ["sh", "/vault/scripts/agent-entrypoint.sh"]
  environment:
    VAULT_ADDR: http://vault:8200
    CERT_TTL: ${TLS_CERT_TTL:-8760h}
  volumes:
    - ./infra/vault:/vault/scripts:ro
    - vault_data:/vault/file:ro
  depends_on:
    vault:
      condition: service_started
  restart: unless-stopped

services:
  postgres:
    image: ankane/pgvector:latest
    command:
      [
        "bash",
        "-lc",
        "cp /tls/cert.pem /var/lib/postgresql/server.crt && cp /tls/key.pem /var/lib/postgresql/server.key && cp /tls/ca.pem /var/lib/postgresql/root.crt && chown postgres:postgres /var/lib/postgresql/server.crt /var/lib/postgresql/server.key /var/lib/postgresql/root.crt && chmod 600 /var/lib/postgresql/server.key && chmod 644 /var/lib/postgresql/server.crt /var/lib/postgresql/root.crt && export PATH=/usr/lib/postgresql/15/bin:$PATH && exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key -c ssl_ca_file=/var/lib/postgresql/root.crt -c hba_file=/etc/postgresql/pg_hba.conf"
      ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-automation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - tls_postgres:/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-automation}"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres-vault-agent:
        condition: service_started

  postgres-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: postgres
      CERT_COMMON_NAME: postgres
      CERT_ALT_NAMES: postgres,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_postgres:/tls

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - tls_redis:/tls:ro
    depends_on:
      redis-vault-agent:
        condition: service_started

  redis-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: redis
      CERT_COMMON_NAME: redis
      CERT_ALT_NAMES: redis,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_redis:/tls

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq
    ports:
      - "5671:5671"
      - "15671:15671"
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - tls_rabbitmq:/tls:ro
    depends_on:
      rabbitmq-vault-agent:
        condition: service_started

  rabbitmq-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: rabbitmq
      CERT_COMMON_NAME: rabbitmq
      CERT_ALT_NAMES: rabbitmq,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_rabbitmq:/tls

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "DevAdmin123!"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /root/.minio/certs/CAs && cp /tls/cert.pem /root/.minio/certs/public.crt && cp /tls/key.pem /root/.minio/certs/private.key && cp /tls/ca.pem /root/.minio/certs/CAs/ca.crt && exec minio server /data --console-address :9001"
      ]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - tls_minio:/tls:ro
    depends_on:
      minio-vault-agent:
        condition: service_started

  minio-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: minio
      CERT_COMMON_NAME: minio
      CERT_ALT_NAMES: minio,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_minio:/tls

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      [
        "start",
        "--import-realm",
        "--http-enabled=false",
        "--https-port=8443",
        "--https-certificate-file=/tls/cert.pem",
        "--https-certificate-key-file=/tls/key.pem",
        "--hostname-strict=false"
      ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8443:8443"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - tls_keycloak:/tls:ro
    depends_on:
      keycloak-vault-agent:
        condition: service_started

  keycloak-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: keycloak
      CERT_COMMON_NAME: keycloak
      CERT_ALT_NAMES: keycloak,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_keycloak:/tls

  flowise:
    image: flowiseai/flowise:2.2.3
    environment:
      PORT: 3000
      DATABASE_TYPE: sqlite
      DATABASE_PATH: /root/.flowise
      LOG_LEVEL: debug
      DEBUG: langchain*,flowise*
      NODE_ENV: development
      REQUEST_TIMEOUT: 300000   # 5 minutes global timeout
      FLOWISE_OPENAI_BASEPATH: ${FLOWISE_OPENAI_BASEPATH:-}
      FLOWISE_TECH_ENGINEER_REPO_LINK: ${FLOWISE_TECH_ENGINEER_REPO_LINK:-https://github.com/appleidbalihar/automation}
      FLOWISE_TECH_ENGINEER_REPO_BRANCH: ${FLOWISE_TECH_ENGINEER_REPO_BRANCH:-master}
      FLOWISE_OPENAI_CHAT_MODEL: ${FLOWISE_OPENAI_CHAT_MODEL:-gpt-4o-mini}
      FLOWISE_OPENAI_EMBEDDING_MODEL: ${FLOWISE_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}

    ports:
      - "3001:3000"
    volumes:
      - flowise_data:/root/.flowise

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - ./infra/vault/vault.hcl:/vault/config/vault.hcl:ro
      - vault_data:/vault/file
    restart: unless-stopped

  vault-bootstrap:
    image: hashicorp/vault:1.17
    entrypoint: ["sh", "/vault/scripts/bootstrap-pki.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_INIT_FILE: /vault/file/vault-init.json
      APPROLE_DIR: /vault/file/approle
      PKI_LEAF_TTL: ${PKI_LEAF_TTL:-8760h}
      VAULT_WATCH_MODE: "true"
      VAULT_WATCH_INTERVAL_SECONDS: 15
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file
    depends_on:
      vault:
        condition: service_started
    restart: unless-stopped

  db-migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_healthy
      postgres-vault-agent:
        condition: service_started
    volumes:
      - tls_postgres:/tls:ro
    restart: "no"

  workflow-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: workflow-service
      CERT_COMMON_NAME: workflow-service
      CERT_ALT_NAMES: workflow-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_workflow_service:/tls

  workflow-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4001
      SERVICE_NAME: workflow-service
      VAULT_ADDR: http://workflow-service-vault-agent:8200
      PLATFORM_OAUTH_SECRET: ${PLATFORM_OAUTH_SECRET:-change-me-in-production}
    volumes:
      - tls_workflow_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      flowise:
        condition: service_started
      workflow-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  logging-service-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: logging-service
      CERT_COMMON_NAME: logging-service
      CERT_ALT_NAMES: logging-service,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_logging_service:/tls

  logging-service:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4005
      SERVICE_NAME: logging-service
    volumes:
      - tls_logging_service:/tls:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      logging-service-vault-agent:
        condition: service_started
    restart: unless-stopped

  api-gateway-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: api-gateway
      CERT_COMMON_NAME: api-gateway
      CERT_ALT_NAMES: api-gateway,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_api_gateway:/tls

  api-gateway:
    image: 09_automationplatform-service-base
    build: *backend-build
    environment:
      <<: *shared-env
      PORT: 4000
      SERVICE_NAME: api-gateway
      PLATFORM_OAUTH_SECRET: ${PLATFORM_OAUTH_SECRET:-change-me-in-production}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://dev.eclassmanager.com/ap}
      OAUTH_POST_CONNECT_REDIRECT: ${OAUTH_POST_CONNECT_REDIRECT:-https://dev.eclassmanager.com/integrations}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - tls_api_gateway:/tls:ro
      - rotation_control:/rotation-control
    depends_on:
      workflow-service:
        condition: service_started
      logging-service:
        condition: service_started
      api-gateway-vault-agent:
        condition: service_started
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${WEB_NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_PLATFORM_URL: ${PLATFORM_URL:-https://dev.eclassmanager.com}
      NEXT_PUBLIC_OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://dev.eclassmanager.com/ap}
      WEB_INTERNAL_API_BASE_URL: ${WEB_INTERNAL_API_BASE_URL:-https://api-gateway:4000}
      PORT: 3000
      KEYCLOAK_URL: ${WEB_KEYCLOAK_URL:-https://keycloak:8443}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REGISTER_DEFAULT_ROLE: ${KEYCLOAK_REGISTER_DEFAULT_ROLE:-useradmin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-automation-platform}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-automation-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
    volumes:
      - tls_web:/tls:ro
    depends_on:
      api-gateway:
        condition: service_started
      web-vault-agent:
        condition: service_started
    restart: unless-stopped

  web-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: web
      CERT_COMMON_NAME: web
      CERT_ALT_NAMES: web,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_web:/tls

  web-ingress:
    image: nginx:1.27-alpine
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./infra/nginx/web-https.conf:/etc/nginx/nginx.conf:ro
      - tls_web_ingress:/tls:ro
    depends_on:
      web:
        condition: service_started
      web-ingress-vault-agent:
        condition: service_started
    ports:
      - "3443:443"
    restart: unless-stopped

  web-ingress-vault-agent:
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: web
      CERT_COMMON_NAME: web
      CERT_ALT_NAMES: web,localhost
      CERT_IP_SANS: ${WEB_CERT_IP_SANS:-}
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_web_ingress:/tls

  cert-rotation-controller:
    image: docker:27-cli
    command: ["sh", "/vault/scripts/rotation-controller.sh"]
    environment:
      ROTATION_INTERVAL_SECONDS: ${ROTATION_INTERVAL_SECONDS:-20}
      TLS_ROOT: /tls
      ROTATION_REQUESTS_FILE: /rotation-control/requests.jsonl
      ROTATION_ENABLE_FALLBACK: ${ROTATION_ENABLE_FALLBACK:-false}
      TARGET_CONTAINERS: ${ROTATION_TARGET_CONTAINERS:-postgres rabbitmq redis keycloak minio opensearch dify-api n8n}
      RESTART_WINDOW_SECONDS: ${RESTART_WINDOW_SECONDS:-1800}
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - tls_api_gateway:/tls/api-gateway:ro
      - tls_workflow_service:/tls/workflow-service:ro
      - tls_logging_service:/tls/logging-service:ro
      - tls_dify_api:/tls/dify-api:ro
      - tls_n8n:/tls/n8n:ro
      - rotation_control:/rotation-control
    depends_on:
      vault:
        condition: service_started
    restart: unless-stopped

  # ─── Dify RAG Stack ────────────────────────────────────────────────────────
  # Dify provides the multi-tenant RAG engine. Each knowledge base maps to one
  # Dify app. API keys are stored in Vault — never in env vars.
  # TLS certs are auto-issued and renewed by the dify-api-vault-agent sidecar.

  dify-db:
    # Internal Postgres for Dify's own state — isolated from the platform DB.
    # Not exposed to host network. Credentials come from Vault via dify-api startup.
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      POSTGRES_DB: dify
    volumes:
      - dify_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify -d dify"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s
    restart: unless-stopped

  dify-redis:
    # Internal Redis for Dify's celery task queue — isolated from platform Redis.
    image: redis:6-alpine
    command: ["redis-server", "--requirepass", "${DIFY_REDIS_PASSWORD:-dify-redis}"]
    volumes:
      - dify_redis_data:/data
    restart: unless-stopped

  dify-api-vault-agent:
    # Issues and auto-renews TLS cert for dify-api + dify-worker.
    # Both containers share the same tls_dify_api volume.
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: dify-api
      CERT_COMMON_NAME: dify-api
      CERT_ALT_NAMES: dify-api,dify-worker,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_dify_api:/tls

  dify-migrate:
    # One-shot Dify schema migration. API/worker wait for this so the console
    # setup and provisioning APIs never start against an empty database.
    image: langgenius/dify-api:0.6.16
    restart: "no"
    entrypoint: ["sh", "-lc"]
    command: ["cd /app/api && .venv/bin/flask db upgrade"]
    environment:
      MODE: api
      LOG_LEVEL: INFO
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-dify-redis}
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-dify-redis}@dify-redis:6379/1
      SECRET_KEY: ${DIFY_SECRET_KEY:-change-me-seed-from-vault}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
      DIFY_BASE_URL: http://dify-api:5001
    volumes:
      - tls_dify_api:/tls:ro
      - dify_storage:/app/storage
    depends_on:
      dify-api-vault-agent:
        condition: service_started
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

  dify-api:
    # Dify API server — handles KB management, chat, and document indexing.
    # SECRET_KEY is rendered from Vault by the agent; passed via file mount.
    # No sensitive values in env — all in Vault.
    image: langgenius/dify-api:0.6.16
    restart: unless-stopped
    environment:
      MODE: api
      LOG_LEVEL: INFO
      # DB — internal Dify DB only
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      # Redis — internal Dify Redis only
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-dify-redis}
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-dify-redis}@dify-redis:6379/1
      # Secret key for signing — loaded from Vault-rendered file at /tls/dify-secret-key
      # Dify will use the SECRET_KEY env var; we set it from the file in startup.
      SECRET_KEY: ${DIFY_SECRET_KEY:-change-me-seed-from-vault}
      # Storage
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
      # Platform CA so Dify can call OpenAI-compatible endpoints that use our certs
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
      # Vector store for KB chunk indexing
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: postgres
      PGVECTOR_PORT: 5432
      PGVECTOR_USER: ${POSTGRES_USER:-platform}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      PGVECTOR_DATABASE: ${POSTGRES_DB:-automation}
      # Dify's own endpoint — used by worker to call back
      DIFY_BASE_URL: http://dify-api:5001
      # CORS — allow the Dify web UI (port 3002) to call this API across origins.
      # CONSOLE_CORS_ALLOW_ORIGINS covers the /console/api/* routes (login, setup, etc.)
      # WEB_API_CORS_ALLOW_ORIGINS covers the /api/* routes used by published apps.
      CONSOLE_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ALLOW_ORIGINS:-http://192.168.2.16:3002,http://localhost:3002}
      WEB_API_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ALLOW_ORIGINS:-http://192.168.2.16:3002,http://localhost:3002}
    volumes:
      - tls_dify_api:/tls:ro
      - dify_storage:/app/storage
    ports:
      - "5001:5001"
    depends_on:
      dify-api-vault-agent:
        condition: service_started
      dify-migrate:
        condition: service_completed_successfully
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started
    # Exposed on the LAN so the Dify web console loaded in a browser can call the API.

  dify-worker:
    # Celery worker for async Dify tasks (document indexing, embeddings).
    # Shares the same image and TLS volume as dify-api.
    image: langgenius/dify-api:0.6.16
    restart: unless-stopped
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      DB_USERNAME: dify
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-dify-redis}
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-dify-redis}@dify-redis:6379/1
      SECRET_KEY: ${DIFY_SECRET_KEY:-change-me-seed-from-vault}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: postgres
      PGVECTOR_PORT: 5432
      PGVECTOR_USER: ${POSTGRES_USER:-platform}
      PGVECTOR_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      PGVECTOR_DATABASE: ${POSTGRES_DB:-automation}
      DIFY_BASE_URL: http://dify-api:5001
    volumes:
      - tls_dify_api:/tls:ro
      - dify_storage:/app/storage
    depends_on:
      dify-api-vault-agent:
        condition: service_started
      dify-migrate:
        condition: service_completed_successfully
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

  dify-sandbox:
    # Isolated code execution sandbox for Dify's code node feature.
    image: langgenius/dify-sandbox:0.2.10
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY:-sandbox-default-key}
      GIN_MODE: release
      WORKER_TIMEOUT: 15

  dify-web:
    # Dify admin UI — exposed on host port 3002 for initial setup only.
    # Once configured, admins manage KBs and apps through this UI or the platform API.
    image: langgenius/dify-web:0.6.16
    restart: unless-stopped
    environment:
      EDITION: SELF_HOSTED
      CONSOLE_API_URL: ${DIFY_PUBLIC_API_URL:-http://192.168.2.16:5001}
      APP_API_URL: ${DIFY_PUBLIC_API_URL:-http://192.168.2.16:5001}
    ports:
      - "3002:3000"
    depends_on:
      - dify-api

  # ─── n8n Workflow Automation ────────────────────────────────────────────────
  # n8n orchestrates document sync (GitHub/GitLab/Google Drive → Dify KB) and
  # multi-channel delivery (Slack/Discord/Telegram → Dify → response).
  # All credentials (source tokens, channel tokens) are stored in Vault.
  # TLS certs are auto-issued and renewed by the n8n-vault-agent sidecar.

  n8n-db:
    # Internal Postgres for n8n's own state — isolated from platform DB.
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      POSTGRES_DB: n8n
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  n8n-vault-agent:
    # Issues and auto-renews TLS cert for n8n.
    <<: *vault-agent
    environment:
      VAULT_ADDR: http://vault:8200
      SERVICE_NAME: n8n
      CERT_COMMON_NAME: n8n
      CERT_ALT_NAMES: n8n,localhost
    volumes:
      - ./infra/vault:/vault/scripts:ro
      - vault_data:/vault/file:ro
      - tls_n8n:/tls

  n8n:
    # n8n workflow automation engine.
    # N8N_ENCRYPTION_KEY is set from DIFY_SECRET_KEY-equivalent Vault path.
    # No sensitive credentials in env — workflows pull credentials from n8n's
    # own encrypted credential store (key comes from Vault).
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      # Encryption key for n8n credentials store — should be seeded from Vault.
      # Run: infra/n8n/seed-vault-secrets.sh then set N8N_ENCRYPTION_KEY from Vault.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-seed-from-vault}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Sub-path prefix so n8n generates correct asset URLs when served at /n8n/
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: https://dev.eclassmanager.com/n8n/
      # Allow direct LAN access on http://192.168.2.16:5679 during local setup.
      # Public/production access should still be routed through HTTPS.
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      # Public webhook base used for provider push events and externally reachable n8n webhooks.
      WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL:-https://dev.eclassmanager.com/n8n/}
      N8N_USER_MANAGEMENT_DISABLED: "true"
      NODE_EXTRA_CA_CERTS: /tls/ca.pem
    ports:
      - "5679:5678"   # Admin UI on host:5679 for initial setup and template import
    volumes:
      - tls_n8n:/tls:ro
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-vault-agent:
        condition: service_started
      n8n-db:
        condition: service_healthy

  # Add n8n to workflow-service dependencies so sync APIs are available at start
  # (workflow-service depends_on n8n is set on workflow-service service above)

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  vault_data:
  tls_api_gateway:
  tls_workflow_service:
  tls_logging_service:
  rotation_control:
  tls_postgres:
  tls_rabbitmq:
  tls_redis:
  tls_keycloak:
  tls_minio:
  tls_web:
  tls_web_ingress:
  flowise_data:
  # Dify volumes
  dify_db_data:
  dify_redis_data:
  dify_storage:
  tls_dify_api:
  # n8n volumes
  n8n_db_data:
  n8n_data:
  tls_n8n:
